name: Apply operational intelligence implementation

on:
  push:
    branches:
      - feature/operational-intelligence

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/operational-intelligence
          fetch-depth: 0

      - name: Apply validated implementation
        shell: bash
        run: |
          cat .github/oi-payload/part-* > /tmp/operational-intelligence.b64
          base64 --decode /tmp/operational-intelligence.b64 > /tmp/operational-intelligence.tgz
          echo "604f88b5efa8abe6841db9e8ffdd024ec35c41e9f478a463e60c4c6a3025cdef  /tmp/operational-intelligence.tgz" | sha256sum --check --strict
          tar -xzf /tmp/operational-intelligence.tgz -C .
          rm -rf .github/oi-payload
          rm -f .github/workflows/apply-operational-intelligence.yml
          npm test

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement operational intelligence subsystem"
          git push origin HEAD:feature/operational-intelligence
