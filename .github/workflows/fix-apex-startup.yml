name: Fix Apex startup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-apex-startup.yml
  issues:
    types:
      - opened

permissions:
  contents: write
  issues: write

jobs:
  patch:
    if: github.event_name == 'push' || github.event.issue.title == 'Run Apex startup repair'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fix initialization order and refresh cache
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app_path = Path("app.js")
          app = app_path.read_text(encoding="utf-8")

          old = '''  let settings = loadJson(STORAGE_KEYS.settings, defaultSettings);
          let recoveryPoints = loadJson(STORAGE_KEYS.recovery, defaultRecoveryPoints);
          let shift = loadJson(STORAGE_KEYS.shift, defaultShift);
          let merchantWaits = loadJson(STORAGE_KEYS.merchantWaits, {});
          let lastAnalysis = null;
          let deferredInstallPrompt = null;
          let recoveryEditCoordinates = null;

          const $ = (id) => document.getElementById(id);
          const clone = (value) => typeof structuredClone === "function" ? structuredClone(value) : JSON.parse(JSON.stringify(value));
          '''

          new = '''  const clone = (value) => typeof structuredClone === "function" ? structuredClone(value) : JSON.parse(JSON.stringify(value));

          let settings = loadJson(STORAGE_KEYS.settings, defaultSettings);
          let recoveryPoints = loadJson(STORAGE_KEYS.recovery, defaultRecoveryPoints);
          let shift = loadJson(STORAGE_KEYS.shift, defaultShift);
          let merchantWaits = loadJson(STORAGE_KEYS.merchantWaits, {});
          let lastAnalysis = null;
          let deferredInstallPrompt = null;
          let recoveryEditCoordinates = null;

          const $ = (id) => document.getElementById(id);
          '''

          if old not in app:
              raise SystemExit("Expected app.js initialization block was not found")

          app_path.write_text(app.replace(old, new, 1), encoding="utf-8")

          sw_path = Path("service-worker.js")
          sw = sw_path.read_text(encoding="utf-8")
          old_cache = 'const CACHE_NAME = "apex-dispatch-v3-bendesk-1";'
          new_cache = 'const CACHE_NAME = "apex-dispatch-v3-bendesk-2";'

          if old_cache not in sw:
              raise SystemExit("Expected service-worker cache name was not found")

          sw_path.write_text(sw.replace(old_cache, new_cache, 1), encoding="utf-8")
          PY

          rm -f .github/workflows/fix-apex-startup.yml

      - name: Commit fix to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js service-worker.js .github/workflows/fix-apex-startup.yml
          git commit -m "Fix Apex app startup and refresh cache"
          git push origin HEAD:main

      - name: Close repair issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --comment "Apex startup repair committed to main."
